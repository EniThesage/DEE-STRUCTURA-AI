{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password · DEE STRUCTURA AI</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon-16x16.png' %}">
  <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}">
  <link rel="apple-touch-icon" href="{% static 'img/apple-touch-icon.png' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1><span class="brand">DEE STRUCTURA AI</span></h1>
      <div class="subtitle">Reset your password</div>
      <p>Enter your account email and we'll send you a link to set a new password.</p>

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="id_email">Email</label>
          {{ form.email }}
          {% if form.email.errors %}<div class="field-errors">{{ form.email.errors }}</div>{% endif %}
        </div>
        <button type="submit" class="btn-primary">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        <a href="{% url 'accounts:login' %}">Back to login</a>
      </div>
    </div>
  </div>
</body>
</html>
